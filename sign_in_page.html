<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>StartApp</title>
        <link rel="stylesheet" href="css/main.css" class="css" />
    </head>
    <body>
        <main class="d-flex flex-column w-100 h-100 p-sm-5 justify-content-center align-items-center">
            <div class="d-flex flex-column w-100 h-auto p-sm-5 gap-4 justify-content-center">
                <div class="d-flex flex-column w-100 h-auto p-3 p-sm-5 gap-4 justify-content-center align-items-center">
                    <h2 class="text-center fw-bold w-100">Join the StartApp adventure by creating your account</h2>
                    <form class="d-flex flex-column w-100 gap-3" action="verify_account_page.html" method="get">
                        <fieldset class="d-flex flex-column w-100 gap-2">
                            <input id="username-text" name="username-text" type="text" placeholder="Username" required >
                            <input id="phone-number-text" name="phone-number-text" type="tel" placeholder="Phone Number" required >
                            <input id="e-mail-text" name="e-mail-text" type="text" placeholder="E-Mail" required >
                            <input id="password-text" name="password-text" type="text" placeholder="Password" required >
                            <input id="confirm-password-text" name="confirm-password-text" type="text" placeholder="Confirm Password" required >
                        </fieldset>
                        <fieldset class="d-flex flex-column w-100 gap-1 align-items-center">
                            <a class="link" href="login_page.html">I already have an account</a>
                            <button id="create-account-button" type="submit" class="button">Create your account</button>
                        </fieldset>
                    </form>
                </div>
                <p class="px-3 px-sm-5 w-100">
                    By signing up, you agree to our <a href="#">Terms of Service</a> and to occasionally receive emails from us.<br />
                    Please read our <a href="#">Privacy Policy</a> to learn how we use your personal data.
                </p>
            </div>
        </main>
        
        <script src="js/bootstrap/bootstrap.bundle.min.js"></script>
    </body>
</html>
